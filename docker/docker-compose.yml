version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: lakewriter-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DB:-lake_writer}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:6.2.0
    container_name: lakewriter-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:6.2.0
    container_name: lakewriter-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    container_name: lakewriter-admin
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9080:9080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-lake_writer}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: lakewriter-worker
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "9081:9081"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-lake_writer}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: lake-writer-worker
      # Storage backend: hdfs (default) or oss
      STORAGE_TYPE: hdfs
      HDFS_URI: hdfs://namenode:8020
      # --- Uncomment below to switch to OSS ---
      # STORAGE_TYPE: oss
      # OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
      # OSS_ACCESS_KEY: <your-access-key-id>
      # OSS_SECRET_KEY: <your-access-key-secret>
      # OSS_BUCKET: <your-bucket-name>
      NODE_ID: worker-1
      CHECKPOINT_DIR: /data/checkpoints
    volumes:
      - checkpoint-data:/data/checkpoints
    # Mount Hadoop conf if using real HDFS:
    # - /etc/hadoop/conf:/etc/hadoop/conf:ro

volumes:
  mysql-data:
  checkpoint-data:
