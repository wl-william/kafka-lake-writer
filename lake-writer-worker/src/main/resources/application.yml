server:
  port: 9081   # only used by actuator

spring:
  application:
    name: lake-writer-worker
  # Worker runs no business web controllers, but needs a minimal servlet container
  # for actuator endpoints (health, prometheus). Only management.server.port is exposed.
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:lake_writer}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3       # worker only needs: config polling + heartbeat + recovery
      minimum-idle: 1
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: none             # schema managed by sql/init.sql
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL57Dialect

# ===== Kafka Consumer =====
lake-writer:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    group-id: ${KAFKA_GROUP_ID:kafka-lake-writer}
    consumer-count: ${CONSUMER_COUNT:4}
    max-poll-records: 5000
    fetch-min-bytes: 1048576      # 1MB — batch pull for throughput
    fetch-max-wait-ms: 500
    session-timeout-ms: 30000
    heartbeat-interval-ms: 10000
    max-poll-interval-ms: 300000  # 5min — must exceed max flush duration
    auto-offset-reset: latest

  # ===== Storage =====
  storage:
    type: ${STORAGE_TYPE:hdfs}    # hdfs | oss
    hdfs:
      default-fs: ${HDFS_URI:hdfs://namenode:8020}
      config:
        dfs.replication: "3"
        dfs.client.block.write.replace-datanode-on-failure.enable: "true"
    oss:
      endpoint: ${OSS_ENDPOINT:}
      access-key-id: ${OSS_ACCESS_KEY:}
      access-key-secret: ${OSS_SECRET_KEY:}
      bucket: ${OSS_BUCKET:}
    # Health probe: used to detect storage recovery after permanent flush failure.
    # probe-path: a root-relative path that always exists (e.g. "/" for HDFS, "/" for OSS bucket root).
    # probe-interval-sec: how often to re-probe while partitions are paused. 30s is a safe default.
    probe-path: ${STORAGE_PROBE_PATH:/}
    probe-interval-sec: ${STORAGE_PROBE_INTERVAL_SEC:30}

  # ===== Buffer =====
  buffer:
    max-total-bytes: 3221225472   # 3GB
    flush-thread-pool-size: 4

  # ===== Config sync =====
  config:
    sync-interval-sec: 30
    version-align-delay-sec: 60

  # ===== Heartbeat =====
  heartbeat:
    interval-sec: 15

  # ===== Checkpoint =====
  # Checkpoints are stored on HDFS/OSS so any node can recover after partition rebalance.
  # Use a dedicated directory separate from data files (not date-partitioned).
  # HDFS example:  hdfs://namenode:8020/lake-writer-checkpoints
  # OSS example:   oss://my-bucket/lake-writer-checkpoints
  checkpoint:
    remote-dir: ${CHECKPOINT_REMOTE_DIR:}

  # ===== Node identity =====
  node:
    id: ${POD_NAME:${HOSTNAME:}}

# Actuator — expose health + prometheus only
management:
  server:
    port: 9081
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: lake-writer-worker
      node: ${POD_NAME:${HOSTNAME:unknown}}
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.lakewriter: INFO
    org.apache.kafka: WARN
    org.apache.hadoop: WARN
    org.apache.parquet: WARN
